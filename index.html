<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="PseudoIDE — editor e intérprete de pseudocódigo en español, 100% en el navegador. Herramienta docente para aprender lógica de programación sin instalar nada.">
<title>PseudoIDE — Editor de Pseudocódigo</title>
<style>
  /* ── RESET & BASE ────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --surface2:  #21262d;
    --border:    #30363d;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --green:     #39d353;
    --green-dim: #1a4a2e;
    --red:       #f85149;
    --red-dim:   #3d1a1a;
    --blue:      #58a6ff;
    --blue-dim:  #1a2a4a;
    --orange:    #ffa657;
    --orange-dim:#3d2a10;
    --purple:    #bc8cff;
    --yellow:    #e3b341;
    --accent:    #238636;
    --accent-h:  #2ea043;
    --radius:    6px;
    --mono:      'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    --sans:      'Segoe UI', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    height: 100vh;
    height: 100dvh; /* móviles: descuenta la barra del navegador */
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ────────────────────────────────────────── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 48px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    z-index: 10;
  }
  .logo {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .logo-icon {
    width: 22px; height: 22px;
    background: var(--green);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    color: #000; font-size: 12px; font-weight: 900;
  }
  .mission-select {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }
  .mission-select label { color: var(--muted); font-size: 12px; }
  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: var(--radius);
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }
  select:focus { border-color: var(--blue); }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    border: none; border-radius: var(--radius);
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background 0.15s, transform 0.1s;
    font-family: var(--sans);
  }
  .btn:active { transform: scale(0.97); }
  .btn-run {
    background: var(--accent); color: #fff;
  }
  .btn-run:hover { background: var(--accent-h); }
  .btn-clear {
    background: var(--surface2); color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-clear:hover { color: var(--text); border-color: var(--muted); }
  .btn-reset {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-reset:hover { color: var(--red); border-color: var(--red); }
  .btn-stop {
    background: var(--red-dim); color: var(--red);
    border: 1px solid var(--red);
  }
  .btn-stop:hover:not(:disabled) { background: var(--red); color: #fff; }
  .btn-stop:disabled { opacity: 0.4; cursor: not-allowed; }

  /* botón de plegar/desplegar panel (solo visible en móvil) */
  .panel-toggle {
    display: none;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
    padding: 4px 8px;
    margin-left: 6px;
    transition: transform 0.2s;
  }
  .panel-toggle:hover { color: var(--text); }

  /* ── SNIPPET BAR ─────────────────────────────────────── */
  .snippetbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .snippetbar-label {
    font-size: 11px;
    color: var(--muted);
    margin-right: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .snip {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 3px 9px;
    border-radius: 20px;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .snip:hover { border-color: var(--green); color: var(--green); }
  .snip.kw-cond  { border-color: #30363d; }
  .snip.kw-cond:hover  { border-color: var(--yellow); color: var(--yellow); }
  .snip.kw-loop  { border-color: #30363d; }
  .snip.kw-loop:hover  { border-color: var(--orange); color: var(--orange); }
  .snip.kw-io    { border-color: #30363d; }
  .snip.kw-io:hover    { border-color: var(--purple); color: var(--purple); }

  /* ── MAIN LAYOUT ─────────────────────────────────────── */
  .workspace {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* ── EDITOR PANEL ────────────────────────────────────── */
  .panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }
  .panel-header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 6px 14px;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .panel-header .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .dot-green { background: var(--green); }
  .dot-blue  { background: var(--blue); }
  .dot-red   { background: var(--red); }

  .editor-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
    display: flex;
  }
  .line-numbers {
    padding: 12px 8px 12px 12px;
    background: var(--surface);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    text-align: right;
    user-select: none;
    min-width: 42px;
    overflow: hidden;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
    white-space: pre;
  }
  #editor {
    flex: 1;
    background: var(--surface);
    color: var(--text);
    border: none;
    outline: none;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    padding: 12px 14px;
    resize: none;
    white-space: pre;
    overflow-wrap: normal;
    overflow: auto;
    tab-size: 2;
    caret-color: var(--green);
  }
  #editor::selection { background: rgba(56,211,83,0.2); }

  /* ── OUTPUT PANEL ────────────────────────────────────── */
  .output-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }
  .console {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    scroll-behavior: smooth;
  }
  .console-line { margin-bottom: 2px; }
  .console-line.out    { color: var(--text); }
  .console-line.info   { color: var(--muted); font-style: italic; }
  .console-line.ok     { color: var(--green); }
  .console-line.err    { color: var(--red); }
  .console-line.warn   { color: var(--yellow); }
  .console-line.input-prompt { color: var(--blue); }
  .console-line.prompt-arrow { color: var(--green); }
  .console-line.header { color: var(--purple); font-weight: bold; }

  /* input en consola */
  .input-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-row label { color: var(--blue); font-family: var(--mono); font-size: 13px; }
  #runtime-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--blue);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    padding: 2px 4px;
  }
  #send-input {
    background: var(--blue-dim);
    border: 1px solid var(--blue);
    color: var(--blue);
    padding: 4px 10px;
    border-radius: var(--radius);
    font-size: 12px;
    cursor: pointer;
    font-family: var(--sans);
  }
  #send-input:hover { background: var(--blue); color: #000; }
  .input-row.hidden { display: none; }

  /* variables watch */
  .vars-panel {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 8px 16px;
    max-height: 120px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .vars-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .vars-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .var-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2px 8px;
    font-family: var(--mono);
    font-size: 11px;
  }
  .var-chip .var-name { color: var(--orange); }
  .var-chip .var-eq   { color: var(--muted); }
  .var-chip .var-val  { color: var(--green); }

  /* statusbar */
  .statusbar {
    background: var(--surface2);
    border-top: 1px solid var(--border);
    padding: 3px 14px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 16px;
    flex-shrink: 0;
    align-items: center;
  }
  #status-msg { margin-left: auto; }
  #status-msg.ok  { color: var(--green); }
  #status-msg.err { color: var(--red); }
  #status-msg.run { color: var(--yellow); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* pantallas estrechas: editor y consola apilados y plegables */
  @media (max-width: 720px) {
    .workspace { display: flex; flex-direction: column; }
    .panel, .output-panel {
      flex: 1 1 0;
      min-height: 0;
    }
    .panel { border-right: none; border-bottom: 1px solid var(--border); }

    /* el botón de flecha aparece y se agranda para tocarlo cómodo */
    .panel-toggle { display: inline-block; padding: 6px 14px; font-size: 14px; }

    /* panel colapsado: solo se ve su cabecera */
    .panel.collapsed, .output-panel.collapsed { flex: 0 0 auto; }
    .panel.collapsed .editor-wrap,
    .panel.collapsed .statusbar,
    .output-panel.collapsed .console,
    .output-panel.collapsed .input-row { display: none; }
    .output-panel.collapsed .vars-panel { display: none !important; }
    .collapsed .panel-toggle { transform: rotate(-90deg); }

    .topbar { height: auto; flex-wrap: wrap; padding: 8px 12px; gap: 8px; }
    .mission-select { margin-left: 0; }

    /* barra de inserción en una sola fila deslizable, sin comerse alto */
    .snippetbar { flex-wrap: nowrap; overflow-x: auto; }
    .snippetbar-label { position: sticky; left: 0; background: var(--surface); }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">P/</div>
    PseudoIDE
  </div>
  <div class="mission-select">
    <label for="mission-picker">Cargar misión:</label>
    <select id="mission-picker">
      <option value="">— Ejemplo en blanco —</option>
      <option value="escape">🔐 Misión #1: Escape Room</option>
      <option value="nave">🚀 Misión #2: Nave Espacial</option>
      <option value="cena">🎄 Misión #3: La Cena de Navidad</option>
    </select>
  </div>
  <button class="btn btn-reset" onclick="resetEditor()">Limpiar</button>
  <button class="btn btn-run" onclick="runCode()">▶ Ejecutar</button>
  <button class="btn btn-stop" id="btn-stop" onclick="stopExecution()" disabled>⏹ Detener</button>
</div>

<!-- SNIPPET BAR -->
<div class="snippetbar">
  <span class="snippetbar-label">Insertar:</span>
  <button type="button" class="snip" onclick="insertSnip('INICIO\n  \nFIN')">INICIO…FIN</button>
  <button type="button" class="snip kw-cond" onclick="insertSnip('SI  ENTONCES\n  \nFIN_SI')">SI…ENTONCES</button>
  <button type="button" class="snip kw-cond" onclick="insertSnip('SI  ENTONCES\n  \nSI NO\n  \nFIN_SI')">SI…SI NO</button>
  <button type="button" class="snip kw-loop" onclick="insertSnip('MIENTRAS  HACER\n  \nFIN_MIENTRAS')">MIENTRAS…HACER</button>
  <button type="button" class="snip kw-loop" onclick="insertSnip('PARA  EN [] HACER\n  \nFIN_PARA')">PARA…EN</button>
  <button type="button" class="snip kw-loop" onclick="insertSnip('PARA  = 1 HASTA  HACER\n  \nFIN_PARA')">PARA…HASTA</button>
  <button type="button" class="snip kw-io" onclick="insertSnip('LEER ')">LEER</button>
  <button type="button" class="snip kw-io" onclick="insertSnip('MOSTRAR \'\'')">MOSTRAR</button>
</div>

<!-- WORKSPACE -->
<div class="workspace">

  <!-- EDITOR -->
  <div class="panel" id="editor-panel">
    <div class="panel-header">
      <span class="dot dot-green"></span>
      Editor de pseudocódigo
      <span style="margin-left:auto;font-size:10px" id="line-col">L1 C1</span>
      <button type="button" class="panel-toggle" aria-label="Plegar o desplegar el editor"
        onclick="togglePanel('editor-panel')">▾</button>
    </div>
    <div class="editor-wrap">
      <div class="line-numbers" id="line-numbers">1</div>
      <textarea id="editor" aria-label="Editor de pseudocódigo" spellcheck="false" autocomplete="off" autocorrect="off"
        placeholder="Escribe tu pseudocódigo aquí...
Pulsa ▶ Ejecutar para ver el resultado."></textarea>
    </div>
    <div class="statusbar">
      <span id="line-count">0 líneas</span>
      <span>Ctrl+Enter = ejecutar</span>
      <span id="status-msg"></span>
    </div>
  </div>

  <!-- OUTPUT (arranca plegado en móvil; en escritorio la clase se ignora) -->
  <div class="output-panel collapsed" id="output-panel">
    <div class="panel-header">
      <span class="dot dot-blue"></span>
      Consola de salida
      <button class="btn btn-clear" style="margin-left:auto;padding:2px 8px;font-size:11px" onclick="clearConsole()">Borrar</button>
      <button type="button" class="panel-toggle" aria-label="Plegar o desplegar la consola"
        onclick="togglePanel('output-panel')">▾</button>
    </div>
    <div class="console" id="console">
      <div class="console-line info">// PseudoIDE listo. Escribe tu pseudocódigo y pulsa ▶ Ejecutar.</div>
      <div class="console-line info">// Usa los botones de la barra superior para cargar una misión de ejemplo.</div>
    </div>
    <div class="input-row hidden" id="input-row">
      <label for="runtime-input">→ Introduce valor:</label>
      <input type="text" id="runtime-input" placeholder="escribe aquí y pulsa Enter…" />
      <button id="send-input" onclick="sendInput()">OK</button>
    </div>
    <div class="vars-panel" id="vars-panel" style="display:none">
      <div class="vars-title">Variables</div>
      <div class="vars-grid" id="vars-grid"></div>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════
//  MISIONES PRECARGADAS
// ═══════════════════════════════════════════════════════
const MISSIONS = {
escape: `// 🔐 MISIÓN #1: ESCAPE ROOM ALGORÍTMICO
// Completa el pseudocódigo para escapar de la sala.

INICIO
  intentos        = 0
  premios         = 0
  puerta_cerrada  = VERDADERO
  código_correcto = FALSO

  // Paso 1: Revisar las 5 cajas (PARA + condición)
  PARA caja EN [PREMIO, TRAMPA, PREMIO, PREMIO, TRAMPA] HACER
    SI caja = PREMIO ENTONCES
      premios = premios + 1
      MOSTRAR 'Premio encontrado. Total: ' + premios
    SI NO
      MOSTRAR '¡Trampa! Caja con bomba 💣'
    FIN_SI
  FIN_PARA

  // Paso 2: Intentos de código (MIENTRAS + condición)
  MIENTRAS intentos < 3 Y puerta_cerrada HACER
    LEER código_introducido
    SI código_introducido = 4712 ENTONCES
      código_correcto = VERDADERO
      puerta_cerrada  = FALSO
    SI NO
      intentos = intentos + 1
      MOSTRAR 'Código incorrecto. Intentos restantes: ' + (3 - intentos)
    FIN_SI
  FIN_MIENTRAS

  // Paso 3: ¿Se abre la puerta?
  SI intentos >= 3 Y puerta_cerrada ENTONCES
    MOSTRAR '🚨 ALARMA ACTIVADA — 3 intentos fallidos'
  SI NO
    SI código_correcto Y premios >= 3 ENTONCES
      MOSTRAR '🎉 ¡ESCAPADOS! Premios recogidos: ' + premios
    SI NO
      MOSTRAR '❌ Premios insuficientes: ' + premios + ' de 3'
    FIN_SI
  FIN_SI

FIN`,

nave: `// 🚀 MISIÓN #2: CONTROL DE LA NAVE ESPACIAL
// Escribe el protocolo de aterrizaje de la nave ALGO-1.

INICIO
  combustible     = 100
  altitud         = 100
  temperatura     = 650
  escudos_activos = FALSO

  MOSTRAR '=== INICIANDO PROTOCOLO DE DESCENSO ==='
  MOSTRAR 'Altitud inicial: ' + altitud + ' km'
  MOSTRAR 'Combustible inicial: ' + combustible + ' u.'

  // Bucle de descenso
  MIENTRAS altitud > 0 Y combustible > 0 HACER
    altitud      = altitud - 10
    combustible  = combustible - 5
    temperatura  = temperatura + 50

    SI temperatura > 800 ENTONCES
      escudos_activos = VERDADERO
      MOSTRAR '🔥 Temp crítica (' + temperatura + '°) — Escudos activados'
    SI NO
      escudos_activos = FALSO
    FIN_SI

    MOSTRAR 'Altitud: ' + altitud + ' km | Combustible: ' + combustible + ' u.'
  FIN_MIENTRAS

  // Resultado del aterrizaje
  SI altitud = 0 ENTONCES
    MOSTRAR '🎉 ¡ATERRIZAJE EXITOSO EN BUCLE-7! Tripulación a salvo.'
  SI NO
    MOSTRAR '⚠️ EMERGENCIA: combustible agotado a ' + altitud + ' km'
  FIN_SI

FIN`,

cena: `// 🎄 MISIÓN #3: LA CENA DE NAVIDAD (SUPERVIVENCIA FAMILIAR)
// 6 rondas, 3 opciones cada una. En cada ronda escribe 1, 2 o 3 en el cuadro
// de entrada y pulsa Enter/OK. Tus 6 decisiones deciden qué final te toca.

INICIO
  fuerza  = 0
  astucia = 0
  labia   = 0

  MOSTRAR '=== LA CENA DE NAVIDAD: SEIS ASALTOS DE SUPERVIVENCIA ==='
  MOSTRAR 'En cada ronda escribe 1, 2 o 3 según lo que harías. No hay opción incorrecta... o sí.'

  PARA turno = 1 HASTA 6 HACER

    SI turno = 1 ENTONCES
      MOSTRAR '--- RONDA 1: El tío Roberto empieza con la política en la mesa ---'
      MOSTRAR '1) Le paras los pies con datos'
      MOSTRAR '2) Vas a por más pan y no vuelves'
      MOSTRAR '3) Le sigues el rollo sin tener ni idea'
    FIN_SI

    SI turno = 2 ENTONCES
      MOSTRAR '--- RONDA 2: La abuela pregunta (sexta vez) cuándo sientas cabeza ---'
      MOSTRAR '1) Respondes con humor afilado'
      MOSTRAR '2) Cambias de tema de sopetón'
      MOSTRAR '3) Prometes nietos para el año que viene'
    FIN_SI

    SI turno = 3 ENTONCES
      MOSTRAR '--- RONDA 3: El primo pequeño derrama el turrón sobre el mantel bueno ---'
      MOSTRAR '1) Le riñes delante de todos'
      MOSTRAR '2) Lo limpias a escondidas antes de que se note'
      MOSTRAR '3) Dices "ya estaba así" para quitar hierro'
    FIN_SI

    SI turno = 4 ENTONCES
      MOSTRAR '--- RONDA 4: Tu cuñado presume de su negocio de criptomonedas ---'
      MOSTRAR '1) Le rebates con números'
      MOSTRAR '2) Finges una llamada urgente y desapareces'
      MOSTRAR '3) Le das la razón en todo para que se calle antes'
    FIN_SI

    SI turno = 5 ENTONCES
      MOSTRAR '--- RONDA 5: Queda un único trozo de turrón y nadie lo admite ---'
      MOSTRAR '1) Lo coges tú sin preguntar'
      MOSTRAR '2) Finges que no te gusta el turrón'
      MOSTRAR '3) Lo partes en trocitos y repartes quedando de maravilla'
    FIN_SI

    SI turno = 6 ENTONCES
      MOSTRAR '--- RONDA 6: Alguien saca las fotos vergonzosas de cuando eras pequeño ---'
      MOSTRAR '1) Las escondes por la fuerza'
      MOSTRAR '2) Te ríes nervioso y cambias de tema'
      MOSTRAR '3) Te ríes con ellos y cuentas tú la anécdota'
    FIN_SI

    LEER opcion

    SI opcion = 1 ENTONCES
      fuerza = fuerza + 1
      MOSTRAR 'Vaya carácter. Se hace un silencio incómodo en la mesa.'
    SI NO
      SI opcion = 2 ENTONCES
        astucia = astucia + 1
        MOSTRAR 'Escapada de manual. Nadie se ha dado ni cuenta.'
      SI NO
        labia = labia + 1
        MOSTRAR 'Con esa labia podrías vender arena en el desierto.'
      FIN_SI
    FIN_SI

  FIN_PARA

  MOSTRAR '=== RESULTADOS DE LA CENA ==='
  MOSTRAR 'Fuerza: ' + fuerza + ' | Astucia: ' + astucia + ' | Labia: ' + labia

//  EDITOR — líneas y columna

const editor = document.getElementById('editor');
const lineNumbers = document.getElementById('line-numbers');
const lineCol = document.getElementById('line-col');
const lineCount = document.getElementById('line-count');

function updateLineNumbers() {
  const lines = editor.value.split('\n');
  lineNumbers.innerHTML = lines.map((_, i) => i + 1).join('\n');
  lineCount.textContent = lines.length + ' líneas';
}

function updateCursor() {
  const txt = editor.value.substring(0, editor.selectionStart);
  const lines = txt.split('\n');
  lineCol.textContent = `L${lines.length} C${lines[lines.length-1].length + 1}`;
}

editor.addEventListener('input', updateLineNumbers);
editor.addEventListener('keyup', updateCursor);
editor.addEventListener('click', updateCursor);

editor.addEventListener('scroll', () => {
  lineNumbers.scrollTop = editor.scrollTop;
});

editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart, end = editor.selectionEnd;
    editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = s + 2;
    updateLineNumbers();
  }
  if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.metaKey) {
    // autoindent
    const s = editor.selectionStart;
    const txt = editor.value.substring(0, s);
    const lastLine = txt.split('\n').pop();
    const indent = lastLine.match(/^(\s*)/)[1];
    // aumentar indent si termina en HACER/ENTONCES/INICIO
    const trimmed = lastLine.trim().toUpperCase();
    const extra = /HACER$|ENTONCES$|^INICIO$|^SI NO$/.test(trimmed) ? '  ' : '';
    setTimeout(() => {
      const ns = editor.selectionStart;
      const before = editor.value.substring(0, ns);
      const after  = editor.value.substring(ns);
      editor.value = before + indent + extra + after;
      editor.selectionStart = editor.selectionEnd = ns + indent.length + extra.length;
      updateLineNumbers();
    }, 0);
  }
});

function insertSnip(text) {
  const s = editor.selectionStart, e2 = editor.selectionEnd;
  editor.value = editor.value.substring(0, s) + text + editor.value.substring(e2);
  editor.selectionStart = editor.selectionEnd = s + text.length;
  editor.focus();
  updateLineNumbers();
}

// ── BORRADOR PERSISTENTE ─────────────────────────────
// El contenido del editor se guarda en localStorage para que recargar
// la página (o cerrarla sin querer) no pierda el trabajo del alumno.
const STORAGE_KEY = 'pseudoide_borrador';

function saveDraft() {
  try {
    localStorage.setItem(STORAGE_KEY, editor.value);
  } catch (e) {
    console.warn('PseudoIDE: no se pudo guardar el borrador (almacenamiento no disponible)', e);
  }
}

editor.addEventListener('input', saveDraft);

function resetEditor() {
  editor.value = '';
  document.getElementById('mission-picker').value = '';
  updateLineNumbers();
  clearConsole();
  document.getElementById('vars-panel').style.display = 'none';
  setStatus('', '');
  try {
    localStorage.removeItem(STORAGE_KEY);
  } catch (e) {
    console.warn('PseudoIDE: no se pudo borrar el borrador (almacenamiento no disponible)', e);
  }
}

document.getElementById('mission-picker').addEventListener('change', function() {
  if (this.value && MISSIONS[this.value]) {
    editor.value = MISSIONS[this.value];
    updateLineNumbers();
    clearConsole();
    document.getElementById('vars-panel').style.display = 'none';
    setStatus('Misión cargada', 'ok');
    saveDraft();
  }
});

// Ctrl+Enter (o Cmd+Enter) ejecuta desde cualquier parte de la página
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runCode();
  }
});

updateLineNumbers();

// restaurar borrador guardado (si lo hay)
try {
  const draft = localStorage.getItem(STORAGE_KEY);
  if (draft) {
    editor.value = draft;
    updateLineNumbers();
    setStatus('Borrador restaurado', 'ok');
  }
} catch (e) {

}

// ═══════════════════════════════════════════════════════
//  INTÉRPRETE DE PSEUDOCÓDIGO
// ═══════════════════════════════════════════════════════

// Estado global de ejecución
let env = {};           // variables
let resolveInput = null;// promesa para input interactivo
let isRunning = false;
let totalSteps = 0;         // pasos ejecutados en esta corrida (todas las llamadas anidadas)
const STEP_LIMIT = 200000;  // tope global anti bucle infinito
const YIELD_EVERY = 200;    // cada N pasos cedemos el hilo para no bloquear el navegador
let stopRequested = false;

// Se llama en cada paso interpretado (líneas, iteraciones de PARA/MIENTRAS).
// Cuenta el total real de trabajo (antes cada llamada recursiva a execute()
// reiniciaba su propio contador, así que un PARA...HASTA con un rango enorme
// nunca activaba ningún límite) y cede el hilo periódicamente con un
// setTimeout real para que el navegador pueda repintar y atender al botón
// "Detener" en vez de quedarse bloqueado ejecutando microtasks sin parar.
async function checkBudget() {
  totalSteps++;
  if (stopRequested) throw new Error('STOPPED');
  if (totalSteps > STEP_LIMIT) {
    throw new Error('Límite de ' + STEP_LIMIT + ' pasos alcanzado (posible bucle infinito). Ejecución detenida.');
  }
  if (totalSteps % YIELD_EVERY === 0) {
    await new Promise(resolve => setTimeout(resolve, 0));
  }
}

function renderVars() {
  const panel = document.getElementById('vars-panel');
  const grid  = document.getElementById('vars-grid');
  const keys  = Object.keys(env);
  if (keys.length === 0) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  // construcción vía DOM (no innerHTML): los nombres de variable vienen del
  // código del usuario y podrían contener HTML
  grid.textContent = '';
  for (const k of keys) {
    const chip = document.createElement('div');
    chip.className = 'var-chip';
    const name = document.createElement('span');
    name.className = 'var-name';
    name.textContent = k;
    const eq = document.createElement('span');
    eq.className = 'var-eq';
    eq.textContent = ' = ';
    const val = document.createElement('span');
    val.className = 'var-val';
    val.textContent = JSON.stringify(env[k]);
    chip.append(name, eq, val);
    grid.appendChild(chip);
  }
}

// ── TOKENIZER ────────────────────────────────────────
function tokenize(line) {
  // quitar comentarios //
  const ci = line.indexOf('//');
  if (ci >= 0) line = line.substring(0, ci);
  return line.trim();
}

// ── EVALUADOR DE EXPRESIONES ─────────────────────────
function isNumVal(v) {
  return typeof v === 'number';
}

function evalExpr(expr) {
  expr = expr.trim();
  if (!expr) return '';

  // booleano VERDADERO/FALSO
  if (/^VERDADERO$/i.test(expr)) return true;
  if (/^FALSO$/i.test(expr)) return false;

  // el + va ANTES del chequeo de "string literal": la regex ^'(.*)'$ es ávida
  // y en 'texto ' + var + ' más' capturaría toda la concatenación como un literal
  const suma = evalSuma(expr);
  if (suma !== undefined) return suma;

  // string literal 'texto' o "texto"
  const strM = expr.match(/^'(.*)'$/s) || expr.match(/^"(.*)"$/s);
  if (strM) return strM[1];

  // número literal
  if (/^-?\d+(\.\d+)?$/.test(expr)) return Number.parseFloat(expr);

  // paréntesis envolventes
  if (expr.startsWith('(') && expr.endsWith(')') && matchingClose(expr, 0) === expr.length - 1) {
    return evalExpr(expr.slice(1, -1).trim());
  }

  const arit = evalAritmetica(expr);
  if (arit !== undefined) return arit;

  return lookupVar(expr);
}

// Suma numérica o concatenación de textos; undefined si no hay + de nivel superior.
function evalSuma(expr) {
  const parts = splitByOp(expr, '+');
  if (parts.length <= 1) return undefined;
  const vals = parts.map(p => evalExpr(p.trim()));
  if (vals.every(isNumVal)) return vals.reduce((a, b) => a + b, 0);
  return vals.map(valToText).join('');
}

function valToText(v) {
  if (typeof v === 'boolean') return v ? 'VERDADERO' : 'FALSO';
  return String(v);
}

// Operadores - * / (de derecha a izquierda); undefined si no hay ninguno.
function evalAritmetica(expr) {
  for (const op of ['-', '*', '/']) {
    const idx = findOpIdx(expr, op);
    if (idx > 0) return aplicarOperador(op, expr, idx);
  }
  return undefined;
}

function aplicarOperador(op, expr, idx) {
  const ln = Number.parseFloat(evalExpr(expr.substring(0, idx).trim()));
  const rn = Number.parseFloat(evalExpr(expr.substring(idx + 1).trim()));
  if (op === '-') return ln - rn;
  if (op === '*') return ln * rn;
  if (rn === 0) throw new Error('División por cero en: ' + expr);
  return ln / rn;
}

// Variable del entorno (insensible a mayúsculas); si no existe, el texto tal cual.
function lookupVar(expr) {
  const k = expr.toUpperCase();
  if (k in env) return env[k];
  if (expr in env) return env[expr];
  return expr;
}

function matchingClose(str, open) {
  const cl = str[open] === '(' ? ')' : ']';
  let depth = 0;
  for (let i = open; i < str.length; i++) {
    if (str[i] === str[open]) depth++;
    if (str[i] === cl) { depth--; if (depth === 0) return i; }
  }
  return -1;
}

// Parte expr por op (nivel superior: fuera de cadenas, paréntesis y corchetes).
function splitByOp(expr, op) {
  const cuts = [];
  let depth = 0;
  scanOutsideStrings(expr, 0, i => {
    const c = expr[i];
    if (c === '(' || c === '[') depth++;
    else if (c === ')' || c === ']') depth--;
    else if (depth === 0 && c === op) cuts.push(i);
    return undefined;
  });
  if (cuts.length === 0) return [expr];
  const parts = [];
  let prev = 0;
  for (const cut of cuts) {
    parts.push(expr.slice(prev, cut));
    prev = cut + 1;
  }
  parts.push(expr.slice(prev));
  return parts;
}

function findOpIdx(expr, op) {
  let depth = 0, strChar = null;
  for (let i = expr.length - 1; i >= 1; i--) {
    const c = expr[i];
    if (strChar) {
      if (c === strChar) strChar = null;
      continue;
    }
    if (c === "'" || c === '"') { strChar = c; continue; }
    if (c === ')' || c === ']') depth++;
    if (c === '(' || c === '[') depth--;
    if (!depth && c === op) return i;
  }
  return -1;
}


// ── EVALUADOR DE CONDICIONES ─────────────────────────
function evalCond(cond) {
  cond = cond.trim();

  // Y / O lógicos. Se parte primero por O (menor precedencia) para que
  // "a O b Y c" se agrupe como "a O (b Y c)", igual que en los lenguajes reales.
  const orIdx = findWordIdx(cond, 'O');
  if (orIdx >= 0) {
    return evalCond(cond.substring(0, orIdx)) || evalCond(cond.substring(orIdx + 1));
  }
  const andIdx = findWordIdx(cond, 'Y');
  if (andIdx >= 0) {
    return evalCond(cond.substring(0, andIdx)) && evalCond(cond.substring(andIdx + 1));
  }

  const comp = evalComparacion(cond);
  if (comp !== undefined) return comp;

  return esVerdadero(evalExpr(cond));
}

// Aplica el primer comparador encontrado fuera de cadenas; undefined si no hay.
function evalComparacion(cond) {
  for (const op of ['>=', '<=', '<>', '!=', '=', '>', '<']) {
    const idx = findCompIdx(cond, op);
    if (idx > 0) {
      const lv = evalExpr(cond.substring(0, idx).trim());
      const rv = evalExpr(cond.substring(idx + op.length).trim());
      return aplicarComparador(op, lv, rv);
    }
  }
  return undefined;
}

function aplicarComparador(op, lv, rv) {
  if (op === '=') return esIgual(lv, rv);
  if (op === '<>' || op === '!=') return !esIgual(lv, rv);
  const ln = Number.parseFloat(lv), rn = Number.parseFloat(rv);
  if (op === '>=') return ln >= rn;
  if (op === '<=') return ln <= rn;
  if (op === '>')  return ln > rn;
  return ln < rn;
}

// Igualdad: numérica si ambos son números; textual sin distinguir mayúsculas si no.
function esIgual(lv, rv) {
  if (isNumVal(lv) && isNumVal(rv)) return lv === rv;
  return String(lv).toUpperCase() === String(rv).toUpperCase();
}

function esVerdadero(v) {
  if (typeof v === 'boolean') return v;
  const vs = String(v).toUpperCase();
  return vs === 'VERDADERO' || vs === 'TRUE' || vs === '1';
}

// Recorre str desde start visitando solo posiciones fuera de literales de
// cadena; visit(i) devuelve un índice para terminar o undefined para seguir.
function scanOutsideStrings(str, start, visit) {
  let inStr = false, strChar = '';
  for (let i = start; i < str.length; i++) {
    const c = str[i];
    if (!inStr && (c === "'" || c === '"')) { inStr = true; strChar = c; continue; }
    if (inStr && c === strChar) { inStr = false; continue; }
    if (inStr) continue;
    const r = visit(i);
    if (r !== undefined) return r;
  }
  return -1;
}

// Busca una palabra suelta (Y/O) fuera de literales de cadena.
// No basta \b de regex: "PREMIO Y TRAMPA" dentro de comillas partiría la condición.
const WORD_CHAR = /[\wÁÉÍÓÚÜÑáéíóúüñ]/;
function findWordIdx(str, word) {
  const W = word.toUpperCase();
  return scanOutsideStrings(str, 0, i => {
    if (str.substring(i, i + W.length).toUpperCase() !== W) return undefined;
    const before = i === 0 ? '' : str[i - 1];
    const after  = str[i + W.length] || '';
    return (!WORD_CHAR.test(before) && !WORD_CHAR.test(after)) ? i : undefined;
  });
}

// Busca un operador de comparación fuera de literales de cadena.
function findCompIdx(cond, op) {
  return scanOutsideStrings(cond, 1, i =>
    cond.substring(i, i + op.length) === op ? i : undefined
  );
}

// ── EJECUTOR ─────────────────────────────────────────
async function runCode() {
  if (isRunning) return;
  isRunning = true;
  env = {};
  totalSteps = 0;
  stopRequested = false;
  clearConsole();
  setStatus('Ejecutando…', 'run');
  document.getElementById('btn-stop').disabled = false;
  focusConsoleMobile();

  const raw = editor.value;
  const lines = raw.split('\n');

  try {
    await execute(lines, 0, lines.length - 1);
    consoleLine('', 'info');
    consoleLine('─── Ejecución completada ───', 'ok');
    setStatus('Completado', 'ok');
  } catch(e) {
    if (e.message === 'INPUT_NEEDED') {
      // ya está esperando, no hacer nada
    } else if (e.message === 'TERMINADO') {
      consoleLine('', 'info');
      consoleLine('─── Programa terminado (instrucción TERMINAR) ───', 'ok');
      setStatus('Completado', 'ok');
    } else if (e.message === 'STOPPED') {
      consoleLine('⏹ Ejecución detenida por el usuario.', 'warn');
      setStatus('Detenido', 'err');
    } else {
      consoleLine('⚠ Error: ' + e.message, 'err');
      setStatus('Error', 'err');
    }
  }

  renderVars();
  hideInput();
  isRunning = false;
  document.getElementById('btn-stop').disabled = true;
}

function stopExecution() {
  stopRequested = true;
  // si está esperando un LEER, hay que desbloquear la promesa para que
  // el siguiente checkBudget() pueda lanzar STOPPED y cortar la ejecución
  if (resolveInput) { resolveInput('0'); resolveInput = null; }
}

async function execute(lines, from, to) {
  let i = from;

  while (i <= to) {
    await checkBudget();

    const line = tokenize(lines[i] || '');
    const UP = line.toUpperCase();

    // vacío, INICIO, o cierres de bloque (ya los consumen los finders)
    if (!line || UP === 'INICIO' || /^(FIN_SI|FIN_MIENTRAS|FIN_PARA|SI NO)$/.test(UP)) { i++; continue; }
    if (UP === 'FIN') break;
    if (UP === 'TERMINAR' || UP.startsWith('TERMINAR ')) throw new Error('TERMINADO');

    i = await execLine(lines, i, line, UP);
  }
}

// Ejecuta la instrucción de la línea i; devuelve el índice de la siguiente línea.
async function execLine(lines, i, line, UP) {
  if (UP.startsWith('MOSTRAR ')) return execMostrar(line, i);
  if (UP.startsWith('EMITIR '))  return execEmitir(line, i);
  if (UP.startsWith('ACTIVAR ')) return execActivar(line, i);
  if (UP.startsWith('LEER '))    return execLeer(line, i);

  // PARA <var> EN [lista] HACER
  const paraEnM = line.match(/^PARA\s+(\S+)\s+EN\s+\[([^\]]*)\]\s+HACER\s*$/i);
  if (paraEnM) return execParaEn(lines, i, paraEnM);

  // PARA <var> = <inicio> HASTA <fin> HACER
  const paraHasta = matchParaHasta(line, UP);
  if (paraHasta) return execParaHasta(lines, i, paraHasta);

  // MIENTRAS <cond> HACER
  const mienCond = middleBetween(line, UP, 'MIENTRAS', 'HACER');
  if (mienCond) return execMientras(lines, i, mienCond);

  // SI <cond> ENTONCES
  const siCond = middleBetween(line, UP, 'SI', 'ENTONCES');
  if (siCond) return execSi(lines, i, siCond);

  // asignación  variable = expresión
  const assignM = line.match(/^([^\s=]+)\s*=\s*(.+)$/);
  if (assignM) return execAsignacion(assignM, i);

  // línea no reconocida — avisar sin detener la ejecución, para que el
  // alumno vea la errata en vez de preguntarse por qué "no hace nada"
  consoleLine('⚠ Línea ' + (i + 1) + ' no reconocida (se ignora): ' + line, 'warn');
  return i + 1;
}

function execMostrar(line, i) {
  consoleLine('▷  ' + String(evalExpr(line.substring(8).trim())));
  renderVars();
  return i + 1;
}

function execEmitir(line, i) {
  consoleLine('📡  EMITIR: ' + evalExpr(line.substring(7).trim()), 'warn');
  return i + 1;
}

function execActivar(line, i) {
  const arg = line.substring(8).trim().toUpperCase();
  env[arg] = true;
  consoleLine('⚡  ACTIVAR ' + arg, 'warn');
  renderVars();
  return i + 1;
}

async function execLeer(line, i) {
  const varName = line.substring(5).trim().toUpperCase();
  consoleLine('◆  LEER ' + varName + ':', 'input-prompt');
  const val = await waitForInput();
  env[varName] = parseInputValue(val);
  consoleLine('   ← ' + val, 'prompt-arrow');
  renderVars();
  return i + 1;
}

// Número si lo parece; VERDADERO/FALSO como booleano; texto en otro caso.
function parseInputValue(val) {
  const num = Number.parseFloat(val);
  if (!Number.isNaN(num)) return num;
  const up = val.toUpperCase();
  if (up === 'VERDADERO') return true;
  if (up === 'FALSO') return false;
  return val;
}

async function execParaEn(lines, i, m) {
  const varN = m[1].toUpperCase();
  const items = m[2].split(',').map(parseListItem);
  const blockEnd = findBlockEnd(lines, i, 'FIN_PARA');
  for (const item of items) {
    await checkBudget();
    env[varN] = item;
    await execute(lines, i + 1, blockEnd - 1);
  }
  return blockEnd + 1;
}

function parseListItem(s) {
  const t = s.trim();
  const num = Number.parseFloat(t);
  return Number.isNaN(num) ? t : num;
}

async function execParaHasta(lines, i, m) {
  const varN  = m.varN.toUpperCase();
  const start = Number.parseFloat(evalExpr(m.start));
  const end   = Number.parseFloat(evalExpr(m.end));
  const blockEnd = findBlockEnd(lines, i, 'FIN_PARA');
  for (let v = start; v <= end; v++) {
    await checkBudget();
    env[varN] = v;
    await execute(lines, i + 1, blockEnd - 1);
  }
  return blockEnd + 1;
}

// Texto entre "abre " y " cierra" (palabras enteras, may/mín ignoradas) o null.
// Reemplaza a las regex tipo /^ABRE\s+(.+?)\s+CIERRA\s*$/ que tenían
// retroceso cuadrático (el .+? perezoso solapaba con el \s+ del cierre).
function middleBetween(line, UP, open, close) {
  if (!UP.startsWith(open + ' ') || !UP.endsWith(' ' + close)) return null;
  const middle = line.slice(open.length, line.length - close.length).trim();
  return middle || null;
}

// Analiza "PARA <var> = <inicio> HASTA <fin> HACER"; devuelve {varN,start,end} o null.
function matchParaHasta(line, UP) {
  const body = middleBetween(line, UP, 'PARA', 'HACER');
  if (!body) return null;
  const hastaIdx = body.toUpperCase().indexOf(' HASTA ');
  const eqIdx = body.indexOf('=');
  if (eqIdx < 1 || hastaIdx < eqIdx) return null;
  const varN = body.slice(0, eqIdx).trim();
  if (!varN || /\s/.test(varN)) return null;   // el nombre de variable no lleva espacios
  return {
    varN,
    start: body.slice(eqIdx + 1, hastaIdx).trim(),
    end:   body.slice(hastaIdx + 7).trim()      // 7 = longitud de " HASTA "
  };
}

async function execMientras(lines, i, cond) {
  const blockEnd = findBlockEnd(lines, i, 'FIN_MIENTRAS');
  let loopCount = 0;
  while (evalCond(cond)) {
    loopCount++;
    if (loopCount > 1000) throw new Error('El bucle MIENTRAS ha iterado más de 1000 veces. Comprueba la condición de salida.');
    await checkBudget();
    await execute(lines, i + 1, blockEnd - 1);
  }
  return blockEnd + 1;
}

async function execSi(lines, i, cond) {
  const { thenEnd, elseStart, elseEnd } = findIfBlock(lines, i);
  if (evalCond(cond)) {
    await execute(lines, i + 1, thenEnd - 1);
  } else if (elseStart >= 0) {
    await execute(lines, elseStart + 1, elseEnd - 1);
  }
  return elseEnd + 1;
}

function execAsignacion(m, i) {
  const k = m[1].toUpperCase();
  // ignorar si empieza con palabra reservada
  if (!['SI', 'FIN', 'PARA', 'MIENTRAS', 'LEER', 'MOSTRAR'].includes(k)) {
    env[k] = evalExpr(m[2].trim());
    renderVars();
  }
  return i + 1;
}

// ── UTILIDADES DE BLOQUES ────────────────────────────

// Si la línea abre un bloque (PARA/MIENTRAS/SI), devuelve su cierre; si no, null.
function blockCloserFor(t) {
  if (/^PARA\s+\S/.test(t) && /\sHACER\s*$/.test(t)) return 'FIN_PARA';
  if (/^MIENTRAS\s+/.test(t) && /\sHACER\s*$/.test(t)) return 'FIN_MIENTRAS';
  if (/^SI\s+/.test(t) && /\sENTONCES\s*$/.test(t)) return 'FIN_SI';
  return null;
}

// Pila de cierres pendientes: cada bloque anidado empuja su propio cierre y
// solo ese cierre lo desapila, de modo que un SI...FIN_SI anidado dentro de un
// PARA/MIENTRAS no descuadra la búsqueda del FIN_PARA/FIN_MIENTRAS exterior.
function findBlockEnd(lines, from, endKeyword) {
  const stack = [endKeyword.toUpperCase()];
  for (let i = from + 1; i < lines.length; i++) {
    const t = tokenize(lines[i]).toUpperCase();
    const closer = blockCloserFor(t);
    if (closer) {
      stack.push(closer);
    } else if (t === stack[stack.length - 1]) {
      stack.pop();
      if (stack.length === 0) return i;
    }
  }
  return lines.length - 1;
}

function findIfBlock(lines, siIdx) {
  let depth = 1, elseStart = -1;
  for (let i = siIdx + 1; i < lines.length; i++) {
    const t = tokenize(lines[i]).toUpperCase();
    if (/^SI\s.+ENTONCES\s*$/.test(t)) { depth++; continue; }
    if (t === 'SI NO' && depth === 1) { elseStart = i; continue; }
    if (t !== 'FIN_SI') continue;
    depth--;
    if (depth === 0) {
      return { thenEnd: elseStart >= 0 ? elseStart : i, elseStart, elseEnd: i };
    }
  }
  return { thenEnd: lines.length - 1, elseStart: -1, elseEnd: lines.length - 1 };
}

// ── INPUT INTERACTIVO ────────────────────────────────
function showInput() {
  // por si el usuario plegó la consola a mano, la reabrimos para que
  // vea la petición de dato y el cuadro de entrada
  document.getElementById('output-panel').classList.remove('collapsed');
  document.getElementById('input-row').classList.remove('hidden');
  document.getElementById('runtime-input').value = '';
  document.getElementById('runtime-input').focus();
}
function hideInput() {
  document.getElementById('input-row').classList.add('hidden');
}

function waitForInput() {
  return new Promise(resolve => {
    resolveInput = resolve;
    showInput();
  });
}

function sendInput() {
  const val = document.getElementById('runtime-input').value.trim() || '0';
  hideInput();
  if (resolveInput) { resolveInput(val); resolveInput = null; }
}

document.getElementById('runtime-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendInput();
});
